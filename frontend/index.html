<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StockSage | SME Decision Intelligence</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    </head>
<body>

<nav class="navbar navbar-dark py-3">
    <div class="container">
        <a class="navbar-brand" href="#">🍃 STOCKSAGE</a>
        <div class="text-white small">
            <span class="pulse-icon me-1"></span> AI Engine Live | <span class="opacity-75">Server: http://localhost:8081</span>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="row mb-4">
        <div class="col-md-4">
            <div class="card stat-card bg-white p-3 shadow-sm text-center">
                <p class="text-muted small mb-1 uppercase fw-bold">Current Stock Value</p>
                <h3 class="fw-bold text-dark" id="stockValue">RM 0.00</h3>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card stat-card bg-danger text-white p-3 shadow-sm text-center">
                <p class="small mb-1 uppercase fw-bold">Profit at Risk</p>
                <h3 class="fw-bold" id="profitRisk">RM 0.00</h3>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card stat-card bg-success text-white p-3 shadow-sm text-center">
                <p class="small mb-1 uppercase fw-bold">Est. Savings (Z.AI)</p>
                <h3 class="fw-bold" id="estSavings">RM 0.00</h3>
            </div>
        </div>
    </div>

    <div class="row">
        <div class="col-lg-8">
            <div class="card card-main p-4">
                <h5 class="fw-bold mb-4">Inventory Health</h5>
                <div class="table-responsive">
                    <table class="table table-hover align-middle">
                        <thead class="table-light small text-uppercase">
                            <tr><th>Product</th><th>Stock</th><th>Expiry</th><th>Status</th></tr>
                        </thead>
                        <tbody id="inventoryTable">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="col-lg-4 mt-4 mt-lg-0">
            <div class="card card-main p-4 ai-panel h-100">
                <span class="badge bg-primary px-3 py-2 mb-2 w-50">Z.AI STRATEGY</span>
                <h4 class="fw-bold">Action Plan</h4>
                <hr>
                <p class="small text-secondary">RECOMMENDATION</p>
                <p class="fw-bold text-dark mb-4" id="aiRec" style="font-size: 1.1rem;">Waiting for Z.AI...</p>
                <p class="small text-secondary">LOGIC & INSIGHT</p>
                <div class="bg-white p-3 rounded-3 shadow-sm small border">
                    <ul class="mb-0 ps-3" id="aiLogic"></ul>
                </div>
                <button class="btn btn-execute w-100 mt-auto" onclick="alert('Strategy Executed!')">Execute Promotion</button>
            </div>
        </div>
    </div>
</div>

<script>
    async function refreshDashboard() {
        try {
            const response = await fetch('http://localhost:8081/api/dashboard-data');
            const data = await response.json();

            // Update Stats
            document.getElementById('stockValue').innerText = "RM " + data.totalStockValue;
            document.getElementById('profitRisk').innerText = "RM " + data.profitAtRisk;
            document.getElementById('estSavings').innerText = "RM " + data.estSavings;

            // Update Strategy
            document.getElementById('aiRec').innerText = '"' + data.strategy.recommendation + '"';
            
            let logicHtml = '';
            data.strategy.logic.forEach(line => {
                logicHtml += `<li class="mb-2">${line}</li>`;
            });
            document.getElementById('aiLogic').innerHTML = logicHtml;

            // Update Table
            let tableHtml = '';
            data.inventory.forEach(item => {
                let badgeClass = item.status === 'Critical' ? 'bg-danger' : (item.status === 'Warning' ? 'bg-warning text-dark' : 'bg-success');
                tableHtml += `
                    <tr>
                        <td><div class="fw-bold">${item.name}</div><small class="text-muted">SKU: ${item.sku}</small></td>
                        <td>${item.stock}</td>
                        <td class="${item.status === 'Critical' ? 'text-danger fw-bold' : ''}">${item.expiry}</td>
                        <td><span class="badge rounded-pill ${badgeClass}">${item.status}</span></td>
                    </tr>`;
            });
            document.getElementById('inventoryTable').innerHTML = tableHtml;

        } catch (error) {
            console.error("Gagal tarik data dari Backend Farhah:", error);
        }
    }

    // Jalankan function ni bila page buka
    refreshDashboard();
</script>
</body>
</html>
